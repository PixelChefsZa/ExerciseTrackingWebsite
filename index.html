<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pose Counter</title>
  <style>
    :root {
      color-scheme: dark;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      padding: clamp(8px, 1.4vh, 16px);
      z-index: 2;
      gap: clamp(8px, 1.2vh, 12px);
    }

    .top-controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1vh, 10px);
      pointer-events: none;
      transform: translateY(-8%);
    }

    .bottom-controls {
      position: absolute;
      bottom: clamp(10px, 7.5vh, 80px);
      left: 50%;
      width: min(76vw, 702px);
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: max(5px, 1vh);
      pointer-events: none;
    }

    header {
      text-align: center;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      pointer-events: none;
      padding-top: 4px;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: clamp(1.1rem, 2vw, 1.7rem);
    }

    header p {
      margin: 0;
      font-size: clamp(0.8rem, 1.4vw, 0.95rem);
      opacity: 0.9;
    }

    .mode-switch {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(4px, 0.8vw, 6px);
      justify-content: center;
      max-width: min(92vw, 920px);
      margin: 0 auto;
      pointer-events: auto;
    }

    .mode-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(10, 10, 10, 0.72);
      color: #fff;
      padding: clamp(6px, 1vw, 8px) clamp(8px, 1.2vw, 11px);
      border-radius: 999px;
      cursor: pointer;
      font-size: clamp(0.72rem, 1vw, 0.84rem);
      line-height: 1.1;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }

    .mode-btn.active {
      background: #00ffaa;
      color: #05140f;
      font-weight: 700;
    }

    .status {
      display: flex;
      gap: clamp(4px, 0.8vw, 6px);
      flex-wrap: wrap;
      justify-content: center;
      width: min(100%, 702px);
      margin: 0 auto;
      pointer-events: auto;
    }

    .status > div {
      background: rgba(10, 10, 10, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: clamp(5px, 0.7vw, 7px) clamp(6px, 0.9vw, 8px);
      border-radius: 10px;
      min-width: clamp(54px, 5.4vw, 64px);
      flex: 1 1 clamp(54px, 5.4vw, 64px);
      text-align: center;
      max-width: clamp(90px, 10.8vw, 108px);
      backdrop-filter: blur(6px);
    }

    .status strong {
      display: block;
      font-size: clamp(0.62rem, 0.8vw, 0.72rem);
      margin-bottom: 2px;
      opacity: 0.9;
    }

    .status div div {
      font-size: clamp(0.8rem, 1vw, 0.95rem);
      font-weight: 700;
    }

    #output {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
      transform: translateZ(0);
    }

    @media (max-width: 760px) {
      body {
        padding: 10px 8px 16px;
      }

      .top-controls {
        gap: 6px;
        transform: translateY(0);
      }

      .mode-switch {
        gap: 5px;
        justify-content: center;
      }

      .mode-btn {
        padding: 7px 9px;
        font-size: 0.8rem;
      }

      .bottom-controls {
        width: min(84vw, 780px);
        justify-content: center;
        padding-bottom: max(2px, 0.4vh);
        transform: translate(-50%, -10%);
      }

      .status {
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        padding-bottom: 2px;
        width: 100%;
      }

      .status > div {
        min-width: clamp(78px, 12vw, 94px);
        flex: 0 0 auto;
        max-width: none;
      }

      #output {
        width: min(100%, 1000px);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 8px 6px 12px;
      }

      .mode-switch {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }

      .mode-btn {
        width: auto;
      }

      .status {
        width: 100%;
      }

      .status > div {
        min-width: clamp(74px, 16vw, 86px);
        flex: 0 0 auto;
      }

      #output {
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Main app container -->
  <div class="app-shell">
    <!-- Camera/video layer -->
    <div class="video-layer">
      <canvas id="output" width="640" height="480"></canvas>
      <video id="video" style="display:none"></video>
    </div>

    <!-- Overlay UI layer -->
    <div class="ui-layer">
      <!-- Top header and mode buttons -->
      <div class="top-controls">
        <header>
          <h1>Pose Counter</h1>
          <p>Choose a mode and perform the exercise to count reps.</p>
        </header>

        <div class="mode-switch">
          <button id="modeCurls" class="mode-btn active" type="button">Arm Curls</button>
          <button id="modeSquats" class="mode-btn" type="button">Squats</button>
          <button id="modeLunges" class="mode-btn" type="button">Forward Lunges</button>
          <button id="modeRaises" class="mode-btn" type="button">Lateral Raises</button>
          <button id="modeSideRaises" class="mode-btn" type="button">Side Lateral Raises</button>
          <button id="modeCrunches" class="mode-btn" type="button">Standing Crunches</button>
        </div>
      </div>

      <!-- Bottom stats and exercise information -->
      <div class="bottom-controls">
        <div class="status" id="curlStats">
          <div>
            <strong>Left Reps</strong>
            <div id="leftReps">0</div>
          </div>
          <div>
            <strong>Right Reps</strong>
            <div id="rightReps">0</div>
          </div>
          <div>
            <strong>Total Reps</strong>
            <div id="totalReps">0</div>
          </div>
          <div>
            <strong>Left Stage</strong>
            <div id="leftStage">None</div>
          </div>
          <div>
            <strong>Right Stage</strong>
            <div id="rightStage">None</div>
          </div>
        </div>

        <div class="status" id="squatStats" style="display: none;">
          <div>
            <strong>Reps</strong>
            <div id="squatReps">0</div>
          </div>
          <div>
            <strong>Stage</strong>
            <div id="squatStage">None</div>
          </div>
          <div>
            <strong>Angle</strong>
            <div id="squatAngle">0°</div>
          </div>
        </div>

        <div class="status" id="lungeStats" style="display: none;">
          <div>
            <strong>Reps</strong>
            <div id="lungeReps">0</div>
          </div>
          <div>
            <strong>Stage</strong>
            <div id="lungeStage">None</div>
          </div>
          <div>
            <strong>Side</strong>
            <div id="lungeSide">-</div>
          </div>
        </div>

        <div class="status" id="raiseStats" style="display: none;">
          <div>
            <strong>Reps</strong>
            <div id="raiseReps">0</div>
          </div>
          <div>
            <strong>Stage</strong>
            <div id="raiseStage">None</div>
          </div>
          <div>
            <strong>Angle</strong>
            <div id="raiseAngle">0°</div>
          </div>
        </div>

        <div class="status" id="sideRaiseStats" style="display: none;">
          <div>
            <strong>Reps</strong>
            <div id="sideRaiseReps">0</div>
          </div>
          <div>
            <strong>Stage</strong>
            <div id="sideRaiseStage">None</div>
          </div>
          <div>
            <strong>Angle</strong>
            <div id="sideRaiseAngle">0°</div>
          </div>
        </div>

        <div class="status" id="crunchStats" style="display: none;">
          <div>
            <strong>Reps</strong>
            <div id="crunchReps">0</div>
          </div>
          <div>
            <strong>Stage</strong>
            <div id="crunchStage">None</div>
          </div>
          <div>
            <strong>Bend Angle</strong>
            <div id="crunchAngle">0°</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('output');
    const canvasCtx = canvasElement.getContext('2d');
    const curlStats = document.getElementById('curlStats');
    const squatStats = document.getElementById('squatStats');
    const lungeStats = document.getElementById('lungeStats');
    const raiseStats = document.getElementById('raiseStats');
    const sideRaiseStats = document.getElementById('sideRaiseStats');
    const crunchStats = document.getElementById('crunchStats');
    const leftRepsElement = document.getElementById('leftReps');
    const rightRepsElement = document.getElementById('rightReps');
    const totalRepsElement = document.getElementById('totalReps');
    const leftStageElement = document.getElementById('leftStage');
    const rightStageElement = document.getElementById('rightStage');
    const squatRepsElement = document.getElementById('squatReps');
    const squatStageElement = document.getElementById('squatStage');
    const squatAngleElement = document.getElementById('squatAngle');
    const lungeRepsElement = document.getElementById('lungeReps');
    const lungeStageElement = document.getElementById('lungeStage');
    const lungeSideElement = document.getElementById('lungeSide');
    const raiseRepsElement = document.getElementById('raiseReps');
    const raiseStageElement = document.getElementById('raiseStage');
    const raiseAngleElement = document.getElementById('raiseAngle');
    const sideRaiseRepsElement = document.getElementById('sideRaiseReps');
    const sideRaiseStageElement = document.getElementById('sideRaiseStage');
    const sideRaiseAngleElement = document.getElementById('sideRaiseAngle');
    const crunchRepsElement = document.getElementById('crunchReps');
    const crunchStageElement = document.getElementById('crunchStage');
    const crunchAngleElement = document.getElementById('crunchAngle');
    const modeCurlsButton = document.getElementById('modeCurls');
    const modeSquatsButton = document.getElementById('modeSquats');
    const modeLungesButton = document.getElementById('modeLunges');
    const modeRaisesButton = document.getElementById('modeRaises');
    const modeSideRaisesButton = document.getElementById('modeSideRaises');
    const modeCrunchesButton = document.getElementById('modeCrunches');

    let leftCounter = 0;
    let rightCounter = 0;
    let leftStage = 'None';
    let rightStage = 'None';
    let squatCounter = 0;
    let squatStage = 'UP';
    let lungeCounter = 0;
    let lungeStage = 'None';
    let lungeSide = '-';
    let raiseCounter = 0;
    let raiseStage = 'DOWN';
    let sideRaiseCounter = 0;
    let sideRaiseStage = 'DOWN';
    let crunchCounter = 0;
    let crunchStage = 'UP';
    let currentMode = 'curls';

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs((radians * 180.0) / Math.PI);
      if (angle > 180) {
        angle = 360 - angle;
      }
      return angle;
    }

    function updateArm(stageRef, counterRef, angle) {
      if (angle > 160) {
        stageRef = 'DOWN';
      }

      if (angle < 30 && stageRef === 'DOWN') {
        stageRef = 'UP';
        counterRef += 1;
      }

      return { stage: stageRef, counter: counterRef };
    }

    function updateSquat(angle) {
      if (angle < 110 && squatStage === 'UP') {
        squatStage = 'DOWN';
      }

      if (angle > 140 && squatStage === 'DOWN') {
        squatStage = 'UP';
        squatCounter += 1;
      }

      return { stage: squatStage, counter: squatCounter, angle };
    }

    function setMode(mode) {
      currentMode = mode;
      const isCurls = mode === 'curls';
      const isSquats = mode === 'squats';
      curlStats.style.display = isCurls ? 'flex' : 'none';
      squatStats.style.display = isSquats ? 'flex' : 'none';
      lungeStats.style.display = mode === 'lunges' ? 'flex' : 'none';
      raiseStats.style.display = mode === 'raises' ? 'flex' : 'none';
      sideRaiseStats.style.display = mode === 'sideRaises' ? 'flex' : 'none';
      crunchStats.style.display = mode === 'crunches' ? 'flex' : 'none';
      modeCurlsButton.classList.toggle('active', isCurls);
      modeSquatsButton.classList.toggle('active', isSquats);
      modeLungesButton.classList.toggle('active', mode === 'lunges');
      modeRaisesButton.classList.toggle('active', mode === 'raises');
      modeSideRaisesButton.classList.toggle('active', mode === 'sideRaises');
      modeCrunchesButton.classList.toggle('active', mode === 'crunches');
    }

    modeCurlsButton.addEventListener('click', () => setMode('curls'));
    modeSquatsButton.addEventListener('click', () => setMode('squats'));
    modeLungesButton.addEventListener('click', () => setMode('lunges'));
    modeRaisesButton.addEventListener('click', () => setMode('raises'));
    modeSideRaisesButton.addEventListener('click', () => setMode('sideRaises'));
    modeCrunchesButton.addEventListener('click', () => setMode('crunches'));

    function onResults(results) {
      const frameWidth = results.image?.width || videoElement.videoWidth || canvasElement.width;
      const frameHeight = results.image?.height || videoElement.videoHeight || canvasElement.height;

      if (frameWidth && frameHeight) {
        if (canvasElement.width !== frameWidth || canvasElement.height !== frameHeight) {
          canvasElement.width = frameWidth;
          canvasElement.height = frameHeight;
        }
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {
          color: '#00FFAA',
          lineWidth: 4,
        });
        drawLandmarks(canvasCtx, results.poseLandmarks, {
          color: '#FF2C7A',
          lineWidth: 2,
          radius: 4,
        });

        if (currentMode === 'curls') {
          const leftShoulder = results.poseLandmarks[11];
          const leftElbow = results.poseLandmarks[13];
          const leftWrist = results.poseLandmarks[15];

          if (leftShoulder && leftElbow && leftWrist) {
            const leftAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
            const leftUpdate = updateArm(leftStage, leftCounter, leftAngle);
            leftStage = leftUpdate.stage;
            leftCounter = leftUpdate.counter;
            leftStageElement.textContent = leftStage;
            leftRepsElement.textContent = leftCounter;
          }

          const rightShoulder = results.poseLandmarks[12];
          const rightElbow = results.poseLandmarks[14];
          const rightWrist = results.poseLandmarks[16];

          if (rightShoulder && rightElbow && rightWrist) {
            const rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
            const rightUpdate = updateArm(rightStage, rightCounter, rightAngle);
            rightStage = rightUpdate.stage;
            rightCounter = rightUpdate.counter;
            rightStageElement.textContent = rightStage;
            rightRepsElement.textContent = rightCounter;
          }

          const totalCounter = leftCounter + rightCounter;
          totalRepsElement.textContent = totalCounter;
        } else if (currentMode === 'squats') {
          const leftHip = results.poseLandmarks[23];
          const leftKnee = results.poseLandmarks[25];
          const leftAnkle = results.poseLandmarks[27];
          const rightHip = results.poseLandmarks[24];
          const rightKnee = results.poseLandmarks[26];
          const rightAnkle = results.poseLandmarks[28];

          if (leftHip && leftKnee && leftAnkle && rightHip && rightKnee && rightAnkle) {
            const leftAngle = calculateAngle(leftHip, leftKnee, leftAnkle);
            const rightAngle = calculateAngle(rightHip, rightKnee, rightAnkle);
            const averageAngle = (leftAngle + rightAngle) / 2;
            const squatUpdate = updateSquat(averageAngle);
            squatStage = squatUpdate.stage;
            squatCounter = squatUpdate.counter;
            squatStageElement.textContent = squatStage;
            squatRepsElement.textContent = squatCounter;
            squatAngleElement.textContent = `${Math.round(averageAngle)}°`;
          }
        } else if (currentMode === 'lunges') {
          const leftHip = results.poseLandmarks[23];
          const leftKnee = results.poseLandmarks[25];
          const leftAnkle = results.poseLandmarks[27];
          const rightHip = results.poseLandmarks[24];
          const rightKnee = results.poseLandmarks[26];
          const rightAnkle = results.poseLandmarks[28];

          if (leftHip && leftKnee && leftAnkle && rightHip && rightKnee && rightAnkle) {
            const leftAngle = calculateAngle(leftHip, leftKnee, leftAnkle);
            const rightAngle = calculateAngle(rightHip, rightKnee, rightAnkle);
            const leftStride = leftAngle < 120;
            const rightStride = rightAngle < 120;

            if (leftStride && rightStride) {
              lungeStage = 'DOWN';
              lungeSide = 'BOTH';
            } else if (leftStride) {
              lungeStage = 'DOWN';
              lungeSide = 'LEFT';
            } else if (rightStride) {
              lungeStage = 'DOWN';
              lungeSide = 'RIGHT';
            } else if (lungeStage === 'DOWN') {
              lungeStage = 'UP';
              lungeCounter += 1;
            }

            lungeRepsElement.textContent = lungeCounter;
            lungeStageElement.textContent = lungeStage;
            lungeSideElement.textContent = lungeSide;
          }
        } else if (currentMode === 'raises') {
          const leftShoulder = results.poseLandmarks[11];
          const leftElbow = results.poseLandmarks[13];
          const leftWrist = results.poseLandmarks[15];
          const rightShoulder = results.poseLandmarks[12];
          const rightElbow = results.poseLandmarks[14];
          const rightWrist = results.poseLandmarks[16];

          if (leftShoulder && leftElbow && leftWrist && rightShoulder && rightElbow && rightWrist) {
            const leftAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
            const rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
            const averageAngle = (leftAngle + rightAngle) / 2;

            if (averageAngle > 150) {
              raiseStage = 'DOWN';
            }

            if (averageAngle < 80 && raiseStage === 'DOWN') {
              raiseStage = 'UP';
              raiseCounter += 1;
            }

            raiseRepsElement.textContent = raiseCounter;
            raiseStageElement.textContent = raiseStage;
            raiseAngleElement.textContent = `${Math.round(averageAngle)}°`;
          }
        } else if (currentMode === 'sideRaises') {
          const leftShoulder = results.poseLandmarks[11];
          const leftElbow = results.poseLandmarks[13];
          const leftHip = results.poseLandmarks[23];
          const rightShoulder = results.poseLandmarks[12];
          const rightElbow = results.poseLandmarks[14];
          const rightHip = results.poseLandmarks[24];

          if (leftShoulder && leftElbow && leftHip && rightShoulder && rightElbow && rightHip) {
            const leftAngle = calculateAngle(leftHip, leftShoulder, leftElbow);
            const rightAngle = calculateAngle(rightHip, rightShoulder, rightElbow);
            const averageAngle = (leftAngle + rightAngle) / 2;

            if (averageAngle > 70) {
              sideRaiseStage = 'UP';
            }

            if (averageAngle < 25 && sideRaiseStage === 'UP') {
              sideRaiseStage = 'DOWN';
              sideRaiseCounter += 1;
            }

            sideRaiseRepsElement.textContent = sideRaiseCounter;
            sideRaiseStageElement.textContent = sideRaiseStage;
            sideRaiseAngleElement.textContent = `${Math.round(averageAngle)}°`;
          }
        } else if (currentMode === 'crunches') {
          const leftShoulder = results.poseLandmarks[11];
          const leftHip = results.poseLandmarks[23];
          const leftNose = results.poseLandmarks[0];
          const rightShoulder = results.poseLandmarks[12];
          const rightHip = results.poseLandmarks[24];
          const rightNose = results.poseLandmarks[0];

          if (leftShoulder && leftHip && leftNose && rightShoulder && rightHip && rightNose) {
            const leftAngle = calculateAngle(leftNose, leftShoulder, leftHip);
            const rightAngle = calculateAngle(rightNose, rightShoulder, rightHip);
            const averageAngle = (leftAngle + rightAngle) / 2;

            if (averageAngle > 100) {
              crunchStage = 'UP';
            }

            if (averageAngle < 50 && crunchStage === 'UP') {
              crunchStage = 'BENT';
              crunchCounter += 1;
            }

            crunchRepsElement.textContent = crunchCounter;
            crunchStageElement.textContent = crunchStage;
            crunchAngleElement.textContent = `${Math.round(averageAngle)}°`;
          }
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
      },
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await pose.send({image: videoElement});
      },
    });
    camera.start();
  </script>
</body>
</html>
